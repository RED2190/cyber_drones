    profiles: ["kafka", "mqtt"]
    environment:
      - SYSTEM_NAME=${TELEMETRY_SYSTEM_NAME:-agrodron}
      - COMPONENT_ID=${TELEMETRY_COMPONENT_ID:-telemetry}
      - COMPONENT_TOPIC=${TELEMETRY_COMPONENT_TOPIC:-}
      - BROKER_TYPE=${BROKER_TYPE:-kafka}
      - BROKER_USER=${TELEMETRY_BROKER_USER:-${ADMIN_USER:-admin}}
      - BROKER_PASSWORD=${TELEMETRY_BROKER_PASSWORD:-${ADMIN_PASSWORD:-admin123}}
      - SECURITY_MONITOR_TOPIC=${TELEMETRY_SECURITY_MONITOR_TOPIC:-}
      - MOTORS_TOPIC=${TELEMETRY_MOTORS_TOPIC:-}
      - SPRAYER_TOPIC=${TELEMETRY_SPRAYER_TOPIC:-}
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - PYTHONUNBUFFERED=1
    networks: [drones_net]
    restart: unless-stopped

networks:
  drones_net:
    external: true
    name: ${DOCKER_NETWORK:-drones_net}

volumes:
  journal_data:
