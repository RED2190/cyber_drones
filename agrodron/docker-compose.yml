# Docker Compose для AgroDron.
# Только сервисы компонентов. Брокер добавляется scripts/prepare_system.py из docker/docker-compose.yml

services:
  security_monitor:
    build:
      context: ..
      dockerfile: agrodron/src/security_monitor/docker/Dockerfile
    profiles: ["kafka", "mqtt"]
    environment:
      - SYSTEM_NAME=${SECURITY_MONITOR_SYSTEM_NAME:-agrodron}
      - COMPONENT_ID=${SECURITY_MONITOR_COMPONENT_ID:-security_monitor}
      - COMPONENT_TOPIC=${SECURITY_MONITOR_COMPONENT_TOPIC:-}
      - BROKER_TYPE=${BROKER_TYPE:-kafka}
      - BROKER_USER=${SECURITY_MONITOR_BROKER_USER:-${ADMIN_USER:-admin}}
      - BROKER_PASSWORD=${SECURITY_MONITOR_BROKER_PASSWORD:-${ADMIN_PASSWORD:-admin123}}
      - POLICY_ADMIN_SENDER=${SECURITY_MONITOR_POLICY_ADMIN_SENDER:-}
      - SECURITY_POLICIES=${SECURITY_MONITOR_SECURITY_POLICIES:-}
      - SECURITY_MONITOR_PROXY_REQUEST_TIMEOUT_S=${SECURITY_MONITOR_SECURITY_MONITOR_PROXY_REQUEST_TIMEOUT_S:-10.0}
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - PYTHONUNBUFFERED=1
    networks: [drones_net]
    restart: unless-stopped

  journal:
    build:
      context: ..
      dockerfile: agrodron/src/journal/docker/Dockerfile
    profiles: ["kafka", "mqtt"]
    environment:
      - SYSTEM_NAME=${JOURNAL_SYSTEM_NAME:-agrodron}
      - COMPONENT_ID=${JOURNAL_COMPONENT_ID:-journal}
      - COMPONENT_TOPIC=${JOURNAL_COMPONENT_TOPIC:-}
      - BROKER_TYPE=${BROKER_TYPE:-kafka}
      - BROKER_USER=${JOURNAL_BROKER_USER:-${ADMIN_USER:-admin}}
      - BROKER_PASSWORD=${JOURNAL_BROKER_PASSWORD:-${ADMIN_PASSWORD:-admin123}}
      - JOURNAL_FILE_PATH=${JOURNAL_JOURNAL_FILE_PATH:-/data/journal.ndjson}
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - PYTHONUNBUFFERED=1
    volumes:
      - journal_data:/data
    networks: [drones_net]
    restart: unless-stopped

  navigation:
    build:
      context: ..
      dockerfile: agrodron/src/navigation/docker/Dockerfile
    profiles: ["kafka", "mqtt"]
    environment:
      - SYSTEM_NAME=${NAVIGATION_SYSTEM_NAME:-agrodron}
      - COMPONENT_ID=${NAVIGATION_COMPONENT_ID:-navigation}
      - COMPONENT_TOPIC=${NAVIGATION_COMPONENT_TOPIC:-}
      - BROKER_TYPE=${BROKER_TYPE:-kafka}
      - BROKER_USER=${NAVIGATION_BROKER_USER:-${ADMIN_USER:-admin}}
      - BROKER_PASSWORD=${NAVIGATION_BROKER_PASSWORD:-${ADMIN_PASSWORD:-admin123}}
      - SECURITY_MONITOR_TOPIC=${NAVIGATION_SECURITY_MONITOR_TOPIC:-}
      - SITL_ADAPTER_TOPIC=${NAVIGATION_SITL_ADAPTER_TOPIC:-}
      - JOURNAL_TOPIC=${NAVIGATION_JOURNAL_TOPIC:-}
      - NAVIGATION_POLL_INTERVAL_S=${NAVIGATION_NAVIGATION_POLL_INTERVAL_S:-0.1}
      - NAVIGATION_REQUEST_TIMEOUT_S=${NAVIGATION_NAVIGATION_REQUEST_TIMEOUT_S:-1.0}
      - AGRODRON_NAV_STATE_TOPIC=${NAVIGATION_AGRODRON_NAV_STATE_TOPIC:-}
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - PYTHONUNBUFFERED=1
    networks: [drones_net]
    restart: unless-stopped

  autopilot:
    build:
      context: ..
      dockerfile: agrodron/src/autopilot/docker/Dockerfile
    profiles: ["kafka", "mqtt"]
    environment:
      - SYSTEM_NAME=${AUTOPILOT_SYSTEM_NAME:-agrodron}
      - COMPONENT_ID=${AUTOPILOT_COMPONENT_ID:-autopilot}
      - COMPONENT_TOPIC=${AUTOPILOT_COMPONENT_TOPIC:-}
      - BROKER_TYPE=${BROKER_TYPE:-kafka}
      - BROKER_USER=${AUTOPILOT_BROKER_USER:-${ADMIN_USER:-admin}}
      - BROKER_PASSWORD=${AUTOPILOT_BROKER_PASSWORD:-${ADMIN_PASSWORD:-admin123}}
      - SECURITY_MONITOR_TOPIC=${AUTOPILOT_SECURITY_MONITOR_TOPIC:-}
      - JOURNAL_TOPIC=${AUTOPILOT_JOURNAL_TOPIC:-}
      - AUTOPILOT_CONTROL_INTERVAL_S=${AUTOPILOT_AUTOPILOT_CONTROL_INTERVAL_S:-0.2}
      - AUTOPILOT_NAV_POLL_INTERVAL_S=${AUTOPILOT_AUTOPILOT_NAV_POLL_INTERVAL_S:-0.2}
      - AUTOPILOT_REQUEST_TIMEOUT_S=${AUTOPILOT_AUTOPILOT_REQUEST_TIMEOUT_S:-2.0}
      - NAVIGATION_GET_STATE_ACTION=${AUTOPILOT_NAVIGATION_GET_STATE_ACTION:-get_state}
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - PYTHONUNBUFFERED=1
    networks: [drones_net]
    restart: unless-stopped

  limiter:
    build:
      context: ..
      dockerfile: agrodron/src/limiter/docker/Dockerfile
    profiles: ["kafka", "mqtt"]
    environment:
      - SYSTEM_NAME=${LIMITER_SYSTEM_NAME:-agrodron}
      - COMPONENT_ID=${LIMITER_COMPONENT_ID:-limiter}
      - COMPONENT_TOPIC=${LIMITER_COMPONENT_TOPIC:-}
      - BROKER_TYPE=${BROKER_TYPE:-kafka}
      - BROKER_USER=${LIMITER_BROKER_USER:-${ADMIN_USER:-admin}}
      - BROKER_PASSWORD=${LIMITER_BROKER_PASSWORD:-${ADMIN_PASSWORD:-admin123}}
      - SECURITY_MONITOR_TOPIC=${LIMITER_SECURITY_MONITOR_TOPIC:-}
      - JOURNAL_TOPIC=${LIMITER_JOURNAL_TOPIC:-}
      - LIMITER_CONTROL_INTERVAL_S=${LIMITER_LIMITER_CONTROL_INTERVAL_S:-0.5}
      - LIMITER_NAV_POLL_INTERVAL_S=${LIMITER_LIMITER_NAV_POLL_INTERVAL_S:-0.5}
      - LIMITER_TELEMETRY_POLL_INTERVAL_S=${LIMITER_LIMITER_TELEMETRY_POLL_INTERVAL_S:-1.0}
      - LIMITER_REQUEST_TIMEOUT_S=${LIMITER_LIMITER_REQUEST_TIMEOUT_S:-2.0}
      - LIMITER_MAX_DISTANCE_FROM_PATH_M=${LIMITER_LIMITER_MAX_DISTANCE_FROM_PATH_M:-10.0}
      - LIMITER_MAX_ALT_DEVIATION_M=${LIMITER_LIMITER_MAX_ALT_DEVIATION_M:-3.0}
      - LIMITER_NAVIGATION_GET_STATE_ACTION=${LIMITER_LIMITER_NAVIGATION_GET_STATE_ACTION:-get_state}
      - LIMITER_TELEMETRY_GET_STATE_ACTION=${LIMITER_LIMITER_TELEMETRY_GET_STATE_ACTION:-get_state}
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - PYTHONUNBUFFERED=1
    networks: [drones_net]
    restart: unless-stopped

  emergensy:
    build:
      context: ..
      dockerfile: agrodron/src/emergensy/docker/Dockerfile
    profiles: ["kafka", "mqtt"]
    environment:
      - SYSTEM_NAME=${EMERGENSY_SYSTEM_NAME:-agrodron}
      - COMPONENT_ID=${EMERGENSY_COMPONENT_ID:-emergensy}
      - COMPONENT_TOPIC=${EMERGENSY_COMPONENT_TOPIC:-}
      - BROKER_TYPE=${BROKER_TYPE:-kafka}
      - BROKER_USER=${EMERGENSY_BROKER_USER:-${ADMIN_USER:-admin}}
      - BROKER_PASSWORD=${EMERGENSY_BROKER_PASSWORD:-${ADMIN_PASSWORD:-admin123}}
      - SECURITY_MONITOR_TOPIC=${EMERGENSY_SECURITY_MONITOR_TOPIC:-}
      - EMERGENSY_PUBLISH_TIMEOUT_S=${EMERGENSY_EMERGENSY_PUBLISH_TIMEOUT_S:-1.0}
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - PYTHONUNBUFFERED=1
    networks: [drones_net]
    restart: unless-stopped

  mission_handler:
    build:
      context: ..
      dockerfile: agrodron/src/mission_handler/docker/Dockerfile
    profiles: ["kafka", "mqtt"]
    environment:
      - SYSTEM_NAME=${MISSION_HANDLER_SYSTEM_NAME:-agrodron}
      - COMPONENT_ID=${MISSION_HANDLER_COMPONENT_ID:-mission_handler}
      - COMPONENT_TOPIC=${MISSION_HANDLER_COMPONENT_TOPIC:-}
      - BROKER_TYPE=${BROKER_TYPE:-kafka}
      - BROKER_USER=${MISSION_HANDLER_BROKER_USER:-${ADMIN_USER:-admin}}
      - BROKER_PASSWORD=${MISSION_HANDLER_BROKER_PASSWORD:-${ADMIN_PASSWORD:-admin123}}
      - SECURITY_MONITOR_TOPIC=${MISSION_HANDLER_SECURITY_MONITOR_TOPIC:-}
      - AUTOPILOT_TOPIC=${MISSION_HANDLER_AUTOPILOT_TOPIC:-}
      - JOURNAL_TOPIC=${MISSION_HANDLER_JOURNAL_TOPIC:-}
      - MISSION_HANDLER_REQUEST_TIMEOUT_S=${MISSION_HANDLER_MISSION_HANDLER_REQUEST_TIMEOUT_S:-10.0}
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - PYTHONUNBUFFERED=1
    networks: [drones_net]
    restart: unless-stopped

  motors:
    build:
      context: ..
      dockerfile: agrodron/src/motors/docker/Dockerfile
    profiles: ["kafka", "mqtt"]
    environment:
      - SYSTEM_NAME=${MOTORS_SYSTEM_NAME:-agrodron}
      - COMPONENT_ID=${MOTORS_COMPONENT_ID:-motors}
      - COMPONENT_TOPIC=${MOTORS_COMPONENT_TOPIC:-}
      - BROKER_TYPE=${BROKER_TYPE:-kafka}
      - BROKER_USER=${MOTORS_BROKER_USER:-${ADMIN_USER:-admin}}
      - BROKER_PASSWORD=${MOTORS_BROKER_PASSWORD:-${ADMIN_PASSWORD:-admin123}}
      - SECURITY_MONITOR_TOPIC=${MOTORS_SECURITY_MONITOR_TOPIC:-}
      - SITL_COMMANDS_TOPIC=${MOTORS_SITL_COMMANDS_TOPIC:-}
      - SITL_DRONE_ID=${MOTORS_SITL_DRONE_ID:-drone_001}
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - PYTHONUNBUFFERED=1
    networks: [drones_net]
    restart: unless-stopped

  sprayer:
    build:
      context: ..
      dockerfile: agrodron/src/sprayer/docker/Dockerfile
    profiles: ["kafka", "mqtt"]
    environment:
      - SYSTEM_NAME=${SPRAYER_SYSTEM_NAME:-agrodron}
      - COMPONENT_ID=${SPRAYER_COMPONENT_ID:-sprayer}
      - COMPONENT_TOPIC=${SPRAYER_COMPONENT_TOPIC:-}
      - BROKER_TYPE=${BROKER_TYPE:-kafka}
      - BROKER_USER=${SPRAYER_BROKER_USER:-${ADMIN_USER:-admin}}
      - BROKER_PASSWORD=${SPRAYER_BROKER_PASSWORD:-${ADMIN_PASSWORD:-admin123}}
      - SECURITY_MONITOR_TOPIC=${SPRAYER_SECURITY_MONITOR_TOPIC:-}
