# AUTO-GENERATED by scripts/prepare_system.py
# Do not edit manually. Re-run: python scripts/prepare_system.py agrodron
name: drones
services:
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    profiles:
    - kafka
    ports:
    - ${KAFKA_PORT:-9092}:9092
    - ${KAFKA_INTERNAL_PORT:-29092}:29092
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: SASL_PLAINTEXT://0.0.0.0:9092,SASL_PLAINTEXT_INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: SASL_PLAINTEXT://localhost:${KAFKA_PORT:-9092},SASL_PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,SASL_PLAINTEXT:SASL_PLAINTEXT,SASL_PLAINTEXT_INTERNAL:SASL_PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: SASL_PLAINTEXT_INTERNAL
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN
      KAFKA_SASL_ENABLED_MECHANISMS: PLAIN
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_OPTS: -Djava.security.auth.login.config=/tmp/jaas.conf
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      COMPONENT_USER_A: ${COMPONENT_USER_A:-}
      COMPONENT_PASSWORD_A: ${COMPONENT_PASSWORD_A:-}
      COMPONENT_USER_B: ${COMPONENT_USER_B:-}
      COMPONENT_PASSWORD_B: ${COMPONENT_PASSWORD_B:-}
      COMPONENT_USER_C: ${COMPONENT_USER_C:-}
      COMPONENT_PASSWORD_C: ${COMPONENT_PASSWORD_C:-}
      COMPONENT_USER_D: ${COMPONENT_USER_D:-}
      COMPONENT_PASSWORD_D: ${COMPONENT_PASSWORD_D:-}
      COMPONENT_USER_E: ${COMPONENT_USER_E:-}
      COMPONENT_PASSWORD_E: ${COMPONENT_PASSWORD_E:-}
      COMPONENT_USER_F: ${COMPONENT_USER_F:-}
      COMPONENT_PASSWORD_F: ${COMPONENT_PASSWORD_F:-}
      COMPONENT_USER_G: ${COMPONENT_USER_G:-}
      COMPONENT_PASSWORD_G: ${COMPONENT_PASSWORD_G:-}
    volumes:
    - ../../docker/kafka/entrypoint.sh:/entrypoint.sh:ro
    command:
    - /bin/sh
    - /entrypoint.sh
    networks:
    - drones_net
    healthcheck:
      test:
      - CMD-SHELL
      - pgrep -f java || exit 1
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 60s
    restart: unless-stopped
  mosquitto:
