networks:
  drones_net:
    name: ${DOCKER_NETWORK:-drones_net}

services:
  zookeeper:
    image: zookeeper:3.7.0
    container_name: zookeeper
    restart: "no"
    profiles: ["kafka"]
    networks:
      - drones_net
    ports:
      - "2181:2181"

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: mosquitto
    restart: "no"
    profiles: ["mqtt"]
    ports:
      - "1883:1883" # Порт для MQTT
      - "9001:9001" # Порт для WebSocket (опционально)
    volumes:
      # Создаем минимальный конфиг, чтобы разрешить анонимные подключения
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      - drones_net

  kafka:
    image: obsidiandynamics/kafka
    container_name: kafka
    restart: "no"
    profiles: ["kafka"]
    networks:
      - drones_net
    ports:
      - "9092:9092"
    environment:
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: DOCKER_INTERNAL:PLAINTEXT,DOCKER_EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: DOCKER_INTERNAL://:29092,DOCKER_EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: DOCKER_INTERNAL://kafka:29092,DOCKER_EXTERNAL://${DOCKER_HOST_IP:-127.0.0.1}:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: DOCKER_INTERNAL
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_BROKER_ID: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper

  kafdrop:
    image: obsidiandynamics/kafdrop
    container_name: kafdrop
    restart: "no"
    profiles: ["kafka"]
    networks:
      - drones_net
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: "kafka:29092"
    depends_on:
      - "kafka"
  
  insurance-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    env_file:
      - .env
    environment:
      SYSTEM_NAMESPACE: ""
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_PROFILES_ACTIVE: ${BROKER_TYPE:-kafka}
      SPRING_DATASOURCE_URL: jdbc:h2:mem:insurancedb
      SPRING_KAFKA_PROPERTIES_SECURITY_PROTOCOL: PLAINTEXT
      SPRING_KAFKA_PROPERTIES_SASL_MECHANISM: ""
      SPRING_KAFKA_PROPERTIES_SASL_JAAS_CONFIG: ""
    networks:
      - drones_net
    restart: on-failure

  tests:
    image: tests:latest
    build: tests
    restart: "no"
    entrypoint: "true"
    environment:
      KAFKA_BROKERS: kafka:29092
    networks:
      - drones_net
    #depends_on:
    #  - kafka
